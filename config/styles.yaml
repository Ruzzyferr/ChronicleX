# Görsel / kamera / geçiş tercihleri (Faz 3 ile genişletilecek)
visual:
  default_aspect: "9:16"
  palette: "dark_cinematic"
  image_style_hints:
    - "cinematic"
    - "historical realism"
    - "dramatic lighting"
    - "fog and shadows"

captions:
  max_words_per_line: 4
  max_lines: 2
  font_name: "Arial Bold"
  font_size: 52
  primary_color: "&H00FFFFFF"    # beyaz (ASS BGR formatı)
  outline_color: "&H00000000"    # siyah outline
  outline_width: 4
  shadow_depth: 2
  alignment: 5                   # orta-merkez (TikTok tarzı)
